<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View RTS build orders for games like Age of Empires, StarCraft, and more." />
    <meta property="og:title" content="RTS Builds - Build Order" />
    <meta property="og:description" content="View and share RTS build orders." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#b0b0b0" />
    <title>RTS Builds - Build Order</title>
    <link rel="icon" href="assets/common/icon/favicon.ico" type="image/x-icon" />
    <style>
        /* Fixed layout styles */
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(176, 176, 176);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgb(220, 220, 220);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header img {
            max-width: 50%;
            height: auto;
        }

        .build-order-title {
            text-align: center;
            margin-bottom: 30px;
            font-family: "Book Antiqua", Palatino, serif;
            font-size: 40px;
        }

        .selectors {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
        }

        .selector-group {
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }

        button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid rgb(204, 204, 204);
            border-radius: 5px;
            background: rgb(55, 55, 55);
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: rgb(85, 85, 85);
        }

        /* Table styles */
        table {
            color: rgb(255, 255, 255);
            background-color: rgb(55, 55, 55);
            margin: 0 auto;
            border-radius: 15px;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        td,
        img {
            vertical-align: middle;
        }

        td {
            text-align: center;
            padding: 10px;
        }

        .note {
            text-align: left;
            padding-right: 25px;
        }

        .full_line {
            text-align: left;
            font-weight: bold;
            padding-left: 25px;
        }

        .full_line img {
            margin-right: 10px;
        }

        .border_top {
            position: relative;
        }

        .border_top::after {
            content: '';
            position: absolute;
            top: 0;
            left: 2.5%;
            width: 95%;
            border: 1px solid rgb(150, 150, 150);
        }

        .column-0 {
            padding-left: 25px;
        }

        a {
            color: var(--reference_color);
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Fixed elements -->
        <div class="header">
            <img src="assets/common/title/rts_builds.webp" alt="RTS Builds Title" />
        </div>
        <h1 class="build-order-title">Build Order</h1>

        <div class="selectors">
            <div class="selector-group">
                <button id="open_in_rts_overlay" aria-label="Open this build order in RTS Overlay">Open in RTS
                    Overlay</button>
            </div>
            <div class="selector-group">
                <button id="copy_bo" aria-label="Copy this build order to clipboard">Copy build order to
                    clipboard</button>
            </div>
            <div class="selector-group">
                <button id="export_bo" aria-label="Export this build order as JSON">Export build order</button>
            </div>
        </div>

        <!-- Container for the build order content -->
        <div id="build-order-content">Loading build order...</div>
    </div>

    <footer style="text-align: center; margin-top: 20px; color: rgb(100, 100, 100);">
        <p>A project initiated by <b>CraftySalamander</b>. Contribute on <a
                href="https://github.com/CraftySalamander/rtsbuilds" target="_blank">Github</a>.</p>
    </footer>

    <!-- Include JS files with async -->
    <script src="images_list.js"></script>
    <script src="display_build_order.js"></script>

    <!-- Update html content based on build order -->
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId');
        const buildOrderId = urlParams.get('buildOrderId');
        const validGames = ["aoe2", "aoe4", "aom", "sc2", "wc3"];

        // Fetch the JSON and call displayBuildOrder
        async function loadAndDisplayBuildOrder() {
            // Check arguments
            if (!gameId || !buildOrderId) {
                const strError = 'Error: Missing URL parameters. Use: ?gameId=GAME_ID&buildOrderId=BO_ID';
                console.error(strError);
                document.getElementById('build-order-content').innerHTML = `
                    <div style="color: red; font-weight: bold; text-align: center; padding: 20px;">
                        ${strError}
                    </div>
                `;
                return;
            }

            // Validate gameId
            if (!validGames.includes(gameId)) {
                const strError = `Error: Invalid game ID: ${gameId}. Valid options: ${validGames.join(", ")}`;
                console.error(strError);
                document.getElementById('build-order-content').innerHTML = `
                    <div style="color: red; font-weight: bold; text-align: center; padding: 20px;">
                        ${strError}
                    </div>
                `;
                return;
            }

            try {
                // Get image lists
                imagesGame = getImagesGame(gameId);
                imagesCommon = getImagesCommon();

                // Get the BO content as dictionary
                const response = await fetch(`api/builds/${gameId}/${buildOrderId}.json`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch: ${response.status} ${response.statusText}`);
                }
                const dataBO = await response.json();

                // Call the existing displayBuildOrder function
                displayBuildOrder(dataBO);
            } catch (error) {
                const strError = `Error loading build order: ${error.message}`;
                console.error(strError);
                document.getElementById('build-order-content').innerHTML = `
                    <div style="color: red; font-weight: bold; text-align: center; padding: 20px;">
                        ${strError}
                    </div>
                `;
            }
        }

        // Load and display the build order when the page loads
        document.addEventListener('DOMContentLoaded', loadAndDisplayBuildOrder);
    </script>
</body>

</html>
